# render.yaml — render.com 배포 설정
# 참고: render.com 대시보드에서 수동으로 설정해도 됩니다

services:
  - type: web
    name: stamp-tour-server
    env: node
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: stamp-db       # render.com PostgreSQL 서비스 이름과 일치시킬 것
          property: connectionString
      - key: JWT_SECRET
        generateValue: true    # render.com이 자동 생성 (재배포 시 변경되지 않음)
      - key: ADMIN_PASSWORD
        sync: false            # 대시보드에서 직접 입력
